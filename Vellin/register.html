<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vellin – Account aanmaken</title>
<link rel="stylesheet" href="CSS/style.css">
<script type="module" src="js/app.js" defer></script>
</head>

<body>
<div class="container">
  <main class="hero-section">
    <aside class="login-card">
      <div class="panel-head">
        <p class="panel-label">Nieuw account</p>
        <h2>Account aanmaken</h2>
      </div>
      <div class="auth-card">
        <div id="foutmelding" style="display:none;background:#fff0f0;color:#c0392b;padding:12px 16px;border-radius:12px;font-size:0.9rem;margin-bottom:4px;"></div>
        <input type="text" id="registerName" placeholder="Volledige naam" autocomplete="name">
        <input type="email" id="registerEmail" placeholder="E-mailadres" autocomplete="email">
        <input type="password" id="registerPassword" placeholder="Wachtwoord" autocomplete="new-password">
        <input type="password" id="registerConfirmPassword" placeholder="Wachtwoord bevestigen"
               autocomplete="new-password" onkeydown="if(event.key==='Enter') registreren()">
        <button onclick="registreren()" class="btn-secondary">Account aanmaken</button>
        <div class="form-row">
          <label><input type="checkbox" id="acceptTerms"> Ik ga akkoord met de gebruiksvoorwaarden</label>
        </div>
      </div>
      <div class="auth-footer">
        Al een account? <a href="index.html">Inloggen</a>
      </div>
    </aside>
  </main>
</div>
</body>
</html>
